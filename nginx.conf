server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Proxy to UAT endpoint
    location /proxy/uat/ {
        proxy_pass https://203.150.143.180/;
        proxy_ssl_verify off;
        proxy_set_header Host 203.150.143.180;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Production endpoint
    location /proxy/prod/ {
        proxy_pass https://phr1.moph.go.th/;
        proxy_ssl_verify off;
        proxy_set_header Host phr1.moph.go.th;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Auth endpoint
    location /proxy/auth/ {
        proxy_pass https://cvp1.moph.go.th/;
        proxy_ssl_verify off;
        proxy_set_header Host cvp1.moph.go.th;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
